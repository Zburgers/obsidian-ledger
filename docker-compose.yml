services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fintrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fintrack}
      POSTGRES_DB: ${POSTGRES_DB:-fintrack}
    ports: ["${DB_HOST_PORT:-9000}:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fintrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    env_file: ./backend/.env
    ports: ["${BACKEND_HOST_PORT:-9001}:8000"]
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: "http://localhost:${BACKEND_HOST_PORT:-9001}/api/v1"
    ports: ["${FRONTEND_HOST_PORT:-9002}:5173"]
    depends_on: [backend]

volumes:
  pgdata:
